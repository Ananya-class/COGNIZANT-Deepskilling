<!DOCTYPE html>
<html>
<head>
    <title>Community Event Portal</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>
        body { background: #f4f4f4; }
    </style>
</head>

<body onbeforeunload="return confirmLeave()">

<header id="mainHeader">
    <h1 style="color:red;">Community Event Portal</h1>
</header>

<!-- Navigation -->
<nav>
    <ul class="nav-menu">
        <li><a href="#">Home</a></li>
        <li><a href="#events">Events</a></li>
        <li><a href="#register">Register</a></li>
        <li><a href="help.html" target="_blank">Help</a></li>
    </ul>
</nav>

<!-- EVENTS -->
<section id="events">
    <h2>Events</h2>
    <div id="eventContainer"></div>
</section>

<!-- REGISTRATION FORM -->
<section id="register">
    <h2>Register</h2>

    <form id="form">
        <input name="name" placeholder="Name" required><br>
        <input name="email" type="email" placeholder="Email" required><br>

        <select id="eventType" name="event">
            <option>Music</option>
            <option>Food</option>
        </select>

        <textarea id="feedback" placeholder="Feedback"></textarea><br>

        <button id="registerBtn">Register</button>
    </form>

    <p id="msg"></p>
</section>

<!-- VIDEO -->
<section>
    <h2>Promo Video</h2>
    <video controls oncanplay="videoReady()">
        <source src="sample.mp4" type="video/mp4">
    </video>
    <p id="videoMsg"></p>
</section>

<!-- GEOLOCATION -->
<section>
    <h2>Find Events Near You</h2>
    <button onclick="getLocation()">Find Nearby</button>
    <p id="location"></p>
</section>

<!-- TABLE -->
<section>
    <h2>Schedule</h2>
    <table>
        <tr><th>Event</th><th>Date</th></tr>
        <tr><td>Music Fest</td><td>10 June</td></tr>
        <tr><td>Food Carnival</td><td>12 June</td></tr>
    </table>
</section>

<script src="script.js"></script>
</body>
</html>
